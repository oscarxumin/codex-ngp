      <stop offset="1" stop-color="#eef8ff"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#80bfe0" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="44" y="36" width="1192" height="150" rx="38" fill="#ffffff" stroke="#f0dfb0" filter="url(#cardShadow)"/>
