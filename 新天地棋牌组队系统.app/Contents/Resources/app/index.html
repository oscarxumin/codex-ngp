<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新天地棋牌组队系统</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f5f2;
      --panel: #ffffff;
      --line: #eadde7;
      --text: #202421;
      --muted: #746b75;
      --accent: #1e9bd7;
      --accent-2: #0b6fae;
      --pink: #ffd7ea;
      --pink-strong: #ff8ec4;
      --danger: #b3261e;
      --warn: #986a00;
    }
    body.dark-mode {
      color-scheme: dark;
      --bg: #0c0f14;
      --panel: #151a22;
      --line: #2c3440;
      --text: #f7f7f7;
      --muted: #c5cbd4;
      --accent: #55c7ff;
      --accent-2: #93dcff;
      --pink: #3a2430;
      --pink-strong: #ff9ccd;
      --danger: #ff8f86;
      --warn: #ffd37a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(135deg, #fffdfd 0%, #f7fbff 45%, #fff0f7 100%);
      color: var(--text);
      letter-spacing: 0;
    }
    body.dark-mode {
      background: #05070a;
    }
    button, input, textarea, select { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 18px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 6px 14px rgba(86, 130, 160, 0.08);
    }
    button:hover { border-color: #f3a8cc; background: #fff7fb; }
    body.dark-mode button:hover { border-color: #55c7ff; background: #202733; }
    button.primary {
      background: linear-gradient(135deg, #5bc8ff, #1e9bd7);
      border-color: #1e9bd7;
      color: #fff;
    }
    button.danger { color: var(--danger); }
    .signup-add-button {
      background: #000;
      border-color: #000;
      color: #fff;
      font-family: "Microsoft YaHei", "微软雅黑", -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 800;
      border-radius: 20px;
      box-shadow: 0 8px 18px rgba(0,0,0,.16);
    }
    .signup-add-button:hover {
      background: #111;
      border-color: #111;
      color: #fff;
    }
    input, textarea, select {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 11px 14px;
      background: var(--panel);
      color: var(--text);
      min-width: 0;
    }
    textarea { resize: vertical; min-height: 72px; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }
    header {
      padding: 18px 26px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: #ffffff;
      border-bottom: 1px solid #f0dce8;
    }
    body.dark-mode header {
      background: #090c10;
      border-bottom-color: var(--line);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .brand-logo {
      width: 68px;
      height: 68px;
      object-fit: contain;
      border-radius: 22px;
      background: #fff;
      border: 1px solid #f3cfe2;
      box-shadow: 0 10px 22px rgba(255, 142, 196, 0.18);
      flex: 0 0 auto;
    }
    .brand-name {
      margin: 0;
      font-size: 17px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1.1;
    }
    h1 { margin: 3px 0 0; font-size: 30px; line-height: 1.12; color: #141b22; }
    body.dark-mode h1 { color: #fff; }
    .brand-subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }
    .status { color: var(--muted); font-size: 13px; }
    .status-card {
      padding: 10px 14px;
      border: 1px solid #e0e6df;
      border-radius: 18px;
      background: #fff8fc;
      white-space: nowrap;
    }
    body.dark-mode .status-card {
      background: #151a22;
      border-color: var(--line);
    }
    nav {
      display: flex;
      gap: 12px;
      padding: 14px 26px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.88);
      overflow-x: auto;
    }
    body.dark-mode nav {
      background: rgba(8, 10, 14, .92);
      border-bottom-color: var(--line);
    }
    nav button {
      min-width: 136px;
      border-radius: 24px;
      font-weight: 900;
      padding: 12px 22px;
    }
    nav button.active {
      background: #ffd7ea;
      border-color: #ff9dcc;
      color: #0b5f94;
      box-shadow: 0 8px 18px rgba(255, 142, 196, .2);
    }
    body.dark-mode nav button.active {
      background: #12364a;
      border-color: #55c7ff;
      color: #fff;
      box-shadow: 0 8px 18px rgba(85, 199, 255, .16);
    }
    main { padding: 18px 26px 24px; min-height: 0; }
    .view { display: none; height: 100%; }
    .view.active { display: block; }
    .toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: minmax(520px, 1.5fr) minmax(360px, 1fr);
      gap: 14px;
      min-height: 560px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      min-width: 0;
      box-shadow: 0 10px 24px rgba(95, 122, 145, .08);
    }
    .panel h2 { margin: 0 0 12px; font-size: 16px; }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
    }
    body.dark-mode table,
    body.dark-mode .team-output,
    body.dark-mode .registration-card,
    body.dark-mode .data-box {
      background: var(--panel);
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid #ecefeb;
      padding: 9px 10px;
      vertical-align: top;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    tbody tr {
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    th { color: #38413a; background: #fff6fb; font-size: 13px; }
    body.dark-mode th {
      color: #f7f7f7;
      background: #1d2430;
    }
    body.dark-mode td,
    body.dark-mode th,
    body.dark-mode .detail-row {
      border-bottom-color: var(--line);
    }
    body.dark-mode tr.selected td { background: #12364a; }
    tr:last-child td { border-bottom: 0; }
    tr.selected td { background: #eaf8ff; }
    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: #fff8fc;
    }
    body.dark-mode .empty,
    body.dark-mode .plan-card,
    body.dark-mode .registration-table {
      background: #111720;
    }
    .detail-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #eef0ec;
    }
    .detail-row:last-child { border-bottom: 0; }
    .label { color: var(--muted); }
    .value { white-space: pre-wrap; overflow-wrap: anywhere; }
    .signup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      min-height: 560px;
    }
    .scroll { max-height: 490px; overflow: auto; }
    .team-output {
      min-height: 520px;
      line-height: 1.55;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #fff;
      overflow: auto;
    }
    .team-summary {
      margin-bottom: 12px;
      color: var(--muted);
    }
    .plan-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fff8fc;
      box-shadow: 0 8px 18px rgba(95, 122, 145, .08);
    }
    .plan-card.selected {
      border-color: var(--accent);
      background: #edf6f2;
    }
    .plan-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .plan-title {
      font-weight: 700;
    }
    .table-group {
      padding: 8px 0;
      border-top: 1px solid #e4e8e2;
    }
    .table-group:first-of-type {
      border-top: 0;
    }
    .table-title {
      color: var(--muted);
      margin-bottom: 4px;
    }
    .team-table {
      border: 0;
      table-layout: fixed;
    }
    .team-table td {
      border: 1px solid #dfe4dc;
      background: #fff;
      padding: 0;
      height: 42px;
      text-align: center;
      vertical-align: middle;
    }
    body.dark-mode .team-table td {
      background: #151a22;
      border-color: var(--line);
    }
    body.dark-mode .seat-button.empty-seat {
      background: #0d1219;
      border-color: #435063;
    }
    .seat-button {
      width: 100%;
      height: 42px;
      border: 0;
      border-radius: 0;
      background: transparent;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .seat-button.empty-seat {
      color: var(--muted);
      background: #f8faf7;
      border: 1px dashed #b9c2b7;
    }
    .seat-button.target-seat {
      color: var(--accent);
      background: #ffe8f3;
      border: 1px solid var(--accent);
      font-weight: 700;
    }
    .leftover-group {
      padding-top: 8px;
      border-top: 1px solid #e4e8e2;
    }
    .leftover-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .manual-team-board {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(360px, 1fr);
      gap: 14px;
      align-items: start;
    }
    .manual-player-list,
    .manual-seat-grid {
      display: grid;
      gap: 8px;
    }
    .manual-player-list {
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    }
    .manual-seat-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .manual-player,
    .manual-seat {
      min-height: 56px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .manual-player.chosen {
      opacity: .46;
    }
    .manual-seat {
      border: 1px dashed #9fcfe8;
      background: #f2fbff;
      color: var(--muted);
    }
    .manual-seat.filled {
      border-style: solid;
      border-color: var(--accent);
      background: #e8f7ff;
      color: var(--text);
      font-weight: 800;
    }
    body.dark-mode .manual-seat {
      background: #0d1219;
      border-color: #385d72;
    }
    body.dark-mode .manual-seat.filled {
      background: #12364a;
      border-color: #55c7ff;
    }
    .pill.leftover {
      background: #fff0e1;
      color: #7a4a00;
      border: 1px solid #f0c77e;
      cursor: pointer;
    }
    body.dark-mode .pill {
      background: #263140;
      color: #f7f7f7;
    }
    body.dark-mode .pill.leftover {
      background: #3a2e15;
      color: #ffe2a0;
      border-color: #81631d;
    }
    .pill {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      background: #eef3ed;
      color: #415044;
      font-size: 12px;
      margin: 0 4px 4px 0;
    }
    dialog {
      width: min(760px, calc(100vw - 48px));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 0;
      box-shadow: 0 18px 50px rgba(0,0,0,.18);
      background: var(--panel);
      color: var(--text);
    }
    dialog::backdrop { background: rgba(0,0,0,.22); }
    .modal-head, .modal-foot {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid var(--line);
    }
    .modal-foot { border-top: 1px solid var(--line); border-bottom: 0; justify-content: flex-end; }
    .modal-body { padding: 16px; }
    .form-grid { display: grid; grid-template-columns: 110px 1fr; gap: 10px 12px; align-items: start; }
    .check-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 12px;
      max-height: 180px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 8px;
    }
    .check-line { display: flex; gap: 6px; align-items: center; min-width: 0; }
    .check-line span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .replace-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .replace-option {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      min-height: 56px;
    }
    .replace-option small {
      color: var(--muted);
    }
    .registration-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 12px;
      background: #fff;
      box-shadow: 0 10px 22px rgba(95, 122, 145, .08);
    }
    .registration-fields {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .registration-fields label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
    }
    .registration-fields input,
    .registration-fields select {
      color: var(--text);
      font-size: 14px;
    }
    .registration-plan {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    .registration-table {
      border: 1px solid #f1d5e6;
      border-radius: 20px;
      padding: 10px;
      background: #fff8fc;
      cursor: pointer;
    }
    .registration-table:hover {
      border-color: var(--accent);
      background: #f1f7f4;
    }
    .registration-table strong {
      display: block;
      margin-bottom: 6px;
    }
    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .data-box {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
      padding: 14px;
    }
    .settings-stack {
      display: grid;
      gap: 14px;
    }
    .mode-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .mode-button.active-mode {
      background: #000;
      border-color: #000;
      color: #fff;
    }
    body.dark-mode .mode-button.active-mode {
      background: #55c7ff;
      border-color: #55c7ff;
      color: #071017;
    }
    .data-box h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .data-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    body.dark-mode .data-box,
    body.dark-mode .registration-table,
    body.dark-mode .date-chip {
      background: #151a22;
      color: var(--text);
    }
    body.dark-mode .registration-table:hover {
      background: #182536;
    }
    body.dark-mode input,
    body.dark-mode textarea,
    body.dark-mode select {
      background: #0d1219;
      color: #fff;
      border-color: var(--line);
    }
    .registration-meta {
      color: var(--muted);
      font-size: 13px;
      margin: 6px 0;
    }
    #dailyReportDialog {
      width: min(980px, calc(100vw - 48px));
    }
    .date-picker-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .date-chip {
      border-radius: 999px;
      padding: 7px 12px;
      background: #fff;
    }
    .date-chip.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .report-shell {
      background: #fff;
      color: #121826;
      padding: 30px;
      border-radius: 8px;
      border: 1px solid var(--line);
    }
    .report-title {
      text-align: center;
      font-size: 34px;
      font-weight: 800;
      margin: 0;
    }
    .report-dates {
      text-align: center;
      color: #4d5562;
      font-size: 22px;
      margin: 14px 0 30px;
    }
    .report-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-bottom: 32px;
    }
    .report-stat {
      border: 1px solid #f0d5e4;
      border-radius: 28px;
      padding: 28px 34px;
      background: #fbfcfe;
    }
    .report-stat-label {
      color: #5d6673;
      font-size: 18px;
      margin-bottom: 18px;
    }
    .report-stat-value {
      font-size: 40px;
      font-weight: 800;
      line-height: 1;
    }
    .report-date-section {
      margin-top: 28px;
    }
    .report-date-heading {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 18px;
    }
    .report-entry {
      border: 1px solid #f0d5e4;
      border-radius: 24px;
      background: #fbfcfe;
      padding: 26px 32px;
      margin-bottom: 22px;
    }
    .report-entry-customers {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 18px;
    }
    .report-entry-line {
      color: #4d5562;
      font-size: 20px;
      margin: 8px 0;
    }
    @media print {
      body * { visibility: hidden; }
      #reportPreview, #reportPreview * { visibility: visible; }
      #reportPreview {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }
      .report-shell {
        border: 0;
      }
    }
    .muted { color: var(--muted); }
    @media (max-width: 900px) {
      .grid-2, .signup-grid, .manual-team-board { grid-template-columns: 1fr; }
      .scroll { max-height: 360px; }
      header { align-items: flex-start; flex-direction: column; }
      .status-card { white-space: normal; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <img class="brand-logo" src="xintiandi-logo.jpg" alt="新天地棋牌会所">
      <div>
        <div class="brand-name">新天地棋牌会所</div>
        <h1>新天地棋牌组队系统</h1>
        <div class="brand-subtitle" id="subtitle">客户总库、每日报名、四人组队、消费登记</div>
      </div>
    </div>
    <div class="status status-card" id="status"></div>
  </header>
  <nav>
    <button class="active" data-view="library">客户总库</button>
    <button data-view="signup">今日报名名单</button>
    <button data-view="teams">自动/手动组队</button>
    <button data-view="registration">每日客户登记</button>
    <button data-view="settings">设置</button>
  </nav>
  <main>
    <section id="library" class="view active">
      <div class="toolbar">
        <input id="search" placeholder="搜索姓名、电话、属性">
        <button class="primary" id="addCustomer">新增客户</button>
        <button id="editCustomer">编辑客户</button>
        <button class="danger" id="deleteCustomer">删除客户</button>
        <button id="fieldsBtn">自定义属性</button>
      </div>
      <div class="grid-2">
        <div class="panel">
          <h2>客户总库</h2>
          <div class="scroll"><table id="customerTable"></table></div>
        </div>
        <div class="panel">
          <h2>客户详情</h2>
          <div id="detail"></div>
        </div>
      </div>
    </section>
    <section id="signup" class="view">
      <div class="toolbar">
        <span>报名日期</span>
        <input type="date" id="dayInput">
      </div>
      <div class="signup-grid">
        <div class="panel">
          <h2>客户总库</h2>
          <div class="toolbar">
            <input id="signupSearch" placeholder="搜索姓名、电话、属性">
            <button class="signup-add-button" id="addSignup">加入当天报名名单</button>
          </div>
          <div class="scroll"><table id="availableTable"></table></div>
        </div>
        <div class="panel">
          <h2>当天报名名单</h2>
          <div class="scroll"><table id="signupTable"></table></div>
          <div class="toolbar" style="margin:12px 0 0">
            <button id="removeSignup">从名单移除</button>
            <button class="danger" id="clearSignup">清空当天名单</button>
          </div>
        </div>
      </div>
    </section>
    <section id="teams" class="view">
      <div class="toolbar">
        <span>组队日期</span>
        <input type="date" id="teamDayInput">
        <button class="primary" id="makeTeams">自动四人组队</button>
        <button id="manualTeams">手动四人组队</button>
        <button class="danger" id="clearTeams">清空组队方案</button>
      </div>
      <div class="panel">
        <h2>组队结果</h2>

<script>
const KEY = "codex-mahjong-team-data-v2";
const THEME_KEY = "codex-mahjong-team-theme";
const MAX_AUTO_PLANS = 300;
const today = () => {
  const now = new Date();
  const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
  return local.toISOString().slice(0, 10);
};
const uid = () => crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
let data = load();
let selectedCustomer = null;
let selectedAvailable = new Set();
let selectedSignup = new Set();
let selectedPlanIndex = null;
let selectedEmptySlot = null;
let selectedReportDates = new Set();
let signupSearchText = "";
let editingId = null;
let importMode = null;
let manualTeamSeats = [null, null, null, null];
let pendingDeleteId = null;
let pendingDeleteTimer = null;

function load() {
  const fallback = { customers: [], fields: ["牌技", "常来时段", "备注标签"], signups: {}, registrations: [] };
  try { return normalizeData(JSON.parse(localStorage.getItem(KEY) || "{}")); }
  catch { return fallback; }
}
function normalizeData(input) {
  const source = input && typeof input === "object" ? input : {};
  const customers = Array.isArray(source.customers) ? source.customers : [];
  const fields = Array.isArray(source.fields) ? source.fields : ["牌技", "常来时段", "备注标签"];
  const signups = source.signups && typeof source.signups === "object" && !Array.isArray(source.signups) ? source.signups : {};
  const registrations = Array.isArray(source.registrations) ? source.registrations : [];
  const normalizeCustomerRef = customer => ({
    id: customer?.id || uid(),
    name: String(customer?.name || "").trim()
  });
  const normalizeGroup = group => {
    const customers = Array.isArray(group)
      ? group
      : (Array.isArray(group?.customers) ? group.customers : []);
    return {
      customers: customers.map(normalizeCustomerRef).filter(customer => customer.name),
      session: ["下午场", "晚间场", "通宵场"].includes(group?.session) ? group.session : "下午场",
      amount: group?.amount || "",
      room: group?.room || "02"
    };
  };
  return {
    ...source,
    customers: customers.map(customer => ({
      id: customer.id || uid(),
      name: String(customer.name || "").trim(),
      phone: customer.phone || "",
      available: customer.available === false ? false : true,
      attrs: customer.attrs && typeof customer.attrs === "object" && !Array.isArray(customer.attrs) ? customer.attrs : {},
      conflicts: Array.isArray(customer.conflicts) ? customer.conflicts : [],
      notes: customer.notes || "",
      createdAt: customer.createdAt || new Date().toISOString()
    })).filter(customer => customer.name),
    fields: fields.map(field => String(field || "").trim()).filter(Boolean),
    signups: Object.fromEntries(Object.entries(signups).map(([day, ids]) => [day, Array.isArray(ids) ? ids : []])),
    registrations: registrations.map(record => ({
      id: record?.id || uid(),
      date: record?.date || today(),
      groups: Array.isArray(record?.groups) ? record.groups.map(normalizeGroup).filter(group => group.customers.length) : [],
      leftovers: Array.isArray(record?.leftovers) ? record.leftovers.map(normalizeCustomerRef).filter(customer => customer.name) : [],
      createdAt: record?.createdAt || new Date().toISOString()
    })).filter(record => record.groups.length || record.leftovers.length)
  };
}
function save() { localStorage.setItem(KEY, JSON.stringify(data)); render(); }
function byId() { return Object.fromEntries(data.customers.map(c => [c.id, c])); }
function signupIds(day = document.querySelector("#dayInput").value) {
  data.signups[day] ||= [];
  return data.signups[day];
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m]));
}
function attrText(c) {
  return data.fields.map(f => c.attrs?.[f] ? `${f}:${c.attrs[f]}` : "").filter(Boolean).join("；");
}
function setView(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.toggle("active", b.dataset.view === id));
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === id));
}
function applyTheme(theme) {
  const nextTheme = theme === "dark" ? "dark" : "light";
  document.body.classList.toggle("dark-mode", nextTheme === "dark");
  localStorage.setItem(THEME_KEY, nextTheme);
  document.querySelectorAll("[data-theme-choice]").forEach(button => {
    button.classList.toggle("active-mode", button.dataset.themeChoice === nextTheme);
  });
}
function loadTheme() {
  applyTheme(localStorage.getItem(THEME_KEY) || "light");
}
function table(el, headers, rows, emptyText) {
  if (!rows.length) {
    el.outerHTML = `<div class="empty" id="${el.id}">${emptyText}</div>`;
    return document.querySelector("#" + el.id);
  }
  el.innerHTML = `<thead><tr>${headers.map(h => `<th style="${h.style || ""}">${h.text}</th>`).join("")}</tr></thead><tbody>${rows.join("")}</tbody>`;
  return el;
}
function ensureTable(id) {
  const node = document.querySelector("#" + id);
  if (node.tagName === "TABLE") return node;
  const t = document.createElement("table");
  t.id = id;
  node.replaceWith(t);
  return t;
}
function render() {
  const day = document.querySelector("#dayInput").value || today();
  document.querySelector("#dayInput").value = day;
  document.querySelector("#teamDayInput").value = day;
  document.querySelector("#status").textContent = `${day} 已报名 ${signupIds(day).length} 人，客户总库 ${data.customers.length} 人`;
  renderCustomers();
  renderDetail();
  renderSignup();
  renderRegistrations();
}
function renderCustomers() {
  const q = document.querySelector("#search").value.trim().toLowerCase();
  const rows = data.customers
    .filter(c => !q || [c.name, c.phone, attrText(c), c.notes].join(" ").toLowerCase().includes(q))
    .sort((a,b) => a.name.localeCompare(b.name, "zh-Hans-CN"))
    .map(c => `<tr data-id="${c.id}" class="${selectedCustomer === c.id ? "selected" : ""}">
      <td>${escapeHtml(c.name)}</td>
      <td>${escapeHtml(c.phone || "-")}</td>
      <td>${c.available === false ? "暂停" : "可报名"}</td>
      <td>${escapeHtml(attrText(c) || "-")}</td>
    </tr>`);
  const el = table(ensureTable("customerTable"), [
    {text:"姓名", style:"width:130px"}, {text:"电话/微信", style:"width:160px"}, {text:"默认状态", style:"width:90px"}, {text:"自定义属性"}
  ], rows, "还没有客户。点击“新增客户”开始录入。");
  el.querySelectorAll("tbody tr").forEach(tr => {
    tr.onclick = () => { selectedCustomer = tr.dataset.id; render(); };
    tr.ondblclick = () => {
      selectedCustomer = tr.dataset.id;
      openCustomer(selectedCustomer);
    };
  });
}
function renderDetail() {
  const c = byId()[selectedCustomer];
  const detail = document.querySelector("#detail");
  if (!c) {
    detail.innerHTML = `<div class="empty">请在左侧选择一个客户。</div>`;
    return;
  }
  const map = byId();
  const conflicts = (c.conflicts || []).map(id => map[id]?.name).filter(Boolean).join("、") || "-";
  const attrs = data.fields.map(f => c.attrs?.[f] ? `<span class="pill">${escapeHtml(f)}：${escapeHtml(c.attrs[f])}</span>` : "").join("") || "-";
  detail.innerHTML = [
    ["姓名", c.name], ["电话/微信", c.phone || "-"], ["默认状态", c.available === false ? "暂停报名" : "默认可报名"],
    ["不能同桌", conflicts], ["属性", attrs], ["备注", c.notes || "-"]
  ].map(([k,v]) => `<div class="detail-row"><div class="label">${k}</div><div class="value">${k === "属性" ? v : escapeHtml(v)}</div></div>`).join("");
}
function renderSignup() {
  const day = document.querySelector("#dayInput").value || today();
  const ids = new Set(signupIds(day));
  const map = byId();
  const query = signupSearchText.trim().toLowerCase();
  const availableRows = data.customers
    .filter(c => !ids.has(c.id))
    .filter(c => {
      if (!query) return true;
      return [c.name, c.phone, attrText(c), c.notes].join(" ").toLowerCase().includes(query);
    })
    .sort((a,b) => a.name.localeCompare(b.name, "zh-Hans-CN"))
    .map(c => `<tr data-id="${c.id}" class="${selectedAvailable.has(c.id) ? "selected" : ""}">
      <td style="width:52px;text-align:center"><input type="checkbox" data-signup-check="${c.id}" ${selectedAvailable.has(c.id) ? "checked" : ""}></td>
      <td>${escapeHtml(c.name)}</td><td>${escapeHtml(c.phone || "-")}</td><td>${c.available === false ? "暂停" : "可报名"}</td>
    </tr>`);
  const signupRows = signupIds(day).map(id => map[id]).filter(Boolean).map(c => {
    const conflicts = (c.conflicts || []).filter(id => ids.has(id)).map(id => map[id]?.name).filter(Boolean).join("、") || "-";
    return `<tr data-id="${c.id}" class="${selectedSignup.has(c.id) ? "selected" : ""}">
      <td>${escapeHtml(c.name)}</td><td>${escapeHtml(c.phone || "-")}</td><td>${escapeHtml(conflicts)}</td>
    </tr>`;
  });
  const a = table(ensureTable("availableTable"), [{text:"选择", style:"width:52px"}, {text:"姓名"}, {text:"电话/微信"}, {text:"状态", style:"width:90px"}], availableRows, "客户总库暂无可加入人员。");
  const s = table(ensureTable("signupTable"), [{text:"姓名"}, {text:"电话/微信"}, {text:"冲突提醒"}], signupRows, "这个日期还没有报名客户。");
  a.querySelectorAll("tbody tr").forEach(tr => {
    tr.onclick = () => toggleSet(selectedAvailable, tr.dataset.id);
    tr.ondblclick = () => addOneToSignup(tr.dataset.id);
  });
  a.querySelectorAll("[data-signup-check]").forEach(check => {
    check.onclick = event => event.stopPropagation();
    check.onchange = () => {
      if (check.checked) selectedAvailable.add(check.dataset.signupCheck);
      else selectedAvailable.delete(check.dataset.signupCheck);
      renderSignup();
    };
  });
  s.querySelectorAll("tbody tr").forEach(tr => {
    tr.onclick = () => toggleSet(selectedSignup, tr.dataset.id);
    tr.ondblclick = () => removeOneFromSignup(tr.dataset.id);
  });
}
function tableCustomers(group) {
  return Array.isArray(group) ? group : (group.customers || []);
}
function tableSession(group) {
  return group.session || "下午场";
}
function tableAmount(group) {
  return group.amount || "";
}
function tableRoom(group) {
  return group.room || "02";
}
function renderRegistrations() {
  data.registrations ||= [];
  const list = document.querySelector("#registrationList");
  if (!list) return;
  if (!data.registrations.length) {
    list.innerHTML = `<div class="empty">暂无登记记录。请先在“自动组队”里选择一个方案。</div>`;
    return;
  }
  const grouped = Object.entries(data.registrations.reduce((groups, record) => {
    const day = record.date || today();
    groups[day] ||= [];
    groups[day].push(record);
    return groups;
  }, {})).sort(([a], [b]) => b.localeCompare(a));

  list.innerHTML = grouped.map(([day, records]) => {
    let tableNumber = 0;
    const leftovers = [];
    records.forEach(record => {
      (record.leftovers || []).forEach(customer => {
        if (!leftovers.some(item => (item.id && item.id === customer.id) || item.name === customer.name)) leftovers.push(customer);
      });
    });
    return `
    <div class="registration-card" data-date-group="${escapeHtml(day)}">
      <div class="registration-fields">
        <label>日期
          <input type="date" data-date-field value="${escapeHtml(day)}">
        </label>
        <label>桌数
          <input value="${records.reduce((count, record) => count + (record.groups || []).length, 0)} 桌" disabled>
        </label>
      </div>
      <div class="registration-plan">
        ${records.map(record => (record.groups || []).map((group, index) => {
          tableNumber += 1;
          return `<div class="registration-table" data-table-expense="${record.id}:${index}">
          <strong>第 ${tableNumber} 桌</strong>
          <div class="registration-meta">
            场次：${escapeHtml(group.session || "未填")}　
            金额：${escapeHtml(group.amount || "未填")}　
            房间：${escapeHtml(group.room || "未填")}
          </div>
          <div>${tableCustomers(group).map(c => `<span class="pill">${escapeHtml(c.name)}</span>`).join("")}</div>
        </div>`;
        }).join("")).join("")}
        ${leftovers.length ? `<div class="registration-table">
          <strong>当日淘汰/轮空</strong>
          <div>${leftovers.map(c => `<span class="pill leftover">${escapeHtml(c.name)}</span>`).join("")}</div>
        </div>` : ""}
      </div>
    </div>
  `;
  }).join("");

  list.querySelectorAll("[data-date-field]").forEach(input => {
    input.onchange = () => {
      const card = input.closest("[data-date-group]");
      const oldDay = card.dataset.dateGroup;
      data.registrations.forEach(record => {
        if ((record.date || today()) === oldDay) record.date = input.value;
      });
      localStorage.setItem(KEY, JSON.stringify(data));
      renderRegistrations();
    };
  });
  list.querySelectorAll("[data-table-expense]").forEach(card => {
    card.onclick = () => {
      const [recordId, tableIndexText] = card.dataset.tableExpense.split(":");
      openTableExpense(recordId, Number(tableIndexText));
    };
  });
}
function openTableExpense(recordId, tableIndex) {
  const record = data.registrations.find(item => item.id === recordId);
  if (!record) return;
  const group = record.groups[tableIndex];
  if (!group) return;
  const customers = tableCustomers(group);
  const dialog = document.querySelector("#tableExpenseDialog");
  document.querySelector("#tableExpenseTitle").textContent = `第 ${tableIndex + 1} 桌消费属性`;
  document.querySelector("#tableExpenseForm").innerHTML = `
    <label>场次</label>
    <select id="expenseSession">
      ${["下午场", "晚间场", "通宵场"].map(item => `<option value="${item}" ${tableSession(group) === item ? "selected" : ""}>${item}</option>`).join("")}
    </select>
    <label>消费金额</label>
    <input id="expenseAmount" placeholder="例如 200" value="${escapeHtml(tableAmount(group))}">
    <label>房间信息</label>
    <select id="expenseRoom">
      ${["02", "08", "09", "10", "11", "666", "777", "888"].map(item => `<option value="${item}" ${tableRoom(group) === item ? "selected" : ""}>${item}</option>`).join("")}
    </select>
    <label>客户名单</label>
    <div>${customers.map(c => `<span class="pill">${escapeHtml(c.name)}</span>`).join("")}</div>
  `;
  document.querySelector("#saveTableExpense").onclick = () => {
    if (Array.isArray(record.groups[tableIndex])) {
      record.groups[tableIndex] = { customers, session: "下午场", amount: "", room: "02" };
    }
    record.groups[tableIndex].session = document.querySelector("#expenseSession").value;
    record.groups[tableIndex].amount = document.querySelector("#expenseAmount").value.trim();
    record.groups[tableIndex].room = document.querySelector("#expenseRoom").value;
    localStorage.setItem(KEY, JSON.stringify(data));
    dialog.close();
    renderRegistrations();
  };
  dialog.showModal();
}
function reportRowsForDates(dates) {
  const selected = new Set(dates);
  const rowsByDate = {};
  data.registrations.forEach(record => {
    const date = record.date || today();
    if (!selected.has(date)) return;
    rowsByDate[date] ||= [];
    record.groups.forEach(group => {
      rowsByDate[date].push({
        customers: tableCustomers(group).map(c => c.name).join("、"),
        session: tableSession(group),
        amount: Number(tableAmount(group) || 0),
        room: tableRoom(group)
      });
    });
  });
  return rowsByDate;
}
function availableReportDates() {
  return [...new Set((data.registrations || []).map(record => record.date || today()))].sort().reverse();
}
function openDailyReport() {
  const dates = availableReportDates();
  selectedReportDates = new Set(dates.slice(0, 1));
  document.querySelector("#reportPreview").innerHTML = "";
  renderReportCalendar();
  document.querySelector("#dailyReportDialog").showModal();
}
function renderReportCalendar() {
  const dates = availableReportDates();
  const calendar = document.querySelector("#reportCalendar");
  if (!dates.length) {
    calendar.innerHTML = `<div class="empty">暂无可汇总的登记日期。</div>`;
    return;
  }
  calendar.innerHTML = `<div class="muted" style="margin-bottom:8px">单击选择日期，双击取消选择。</div>
    <div class="date-picker-grid">${dates.map(date => `<button class="date-chip ${selectedReportDates.has(date) ? "selected" : ""}" data-report-date="${date}">${date}</button>`).join("")}</div>`;
  calendar.querySelectorAll("[data-report-date]").forEach(button => {
    let clickTimer = null;
    button.onclick = () => {
      if (clickTimer) clearTimeout(clickTimer);
      clickTimer = setTimeout(() => {
        selectedReportDates.add(button.dataset.reportDate);
        renderReportCalendar();
      }, 180);
    };
    button.ondblclick = () => {
      if (clickTimer) clearTimeout(clickTimer);
      selectedReportDates.delete(button.dataset.reportDate);
      renderReportCalendar();
    };
  });
}
function generateDailyReport() {
  const dates = [...selectedReportDates].sort();
  if (!dates.length) {
    document.querySelector("#reportPreview").innerHTML = `<div class="empty">请先选择至少一个日期。</div>`;
    return false;
  }
  const rowsByDate = reportRowsForDates(dates);
  const orderedDates = Object.keys(rowsByDate).sort();
  const allRows = orderedDates.flatMap(date => rowsByDate[date]);
  const totalAmount = allRows.reduce((sum, row) => sum + row.amount, 0);
  document.querySelector("#reportPreview").innerHTML = `<div class="report-shell">
    <h1 class="report-title">所选日期的报表小结</h1>
    <div class="report-dates">${escapeHtml(dates.join("、"))}</div>
    <div class="report-stats">
      <div class="report-stat">
        <div class="report-stat-label">记录数</div>
        <div class="report-stat-value">${allRows.length}</div>
      </div>
      <div class="report-stat">
        <div class="report-stat-label">总台费</div>
        <div class="report-stat-value">¥${totalAmount}</div>
      </div>
    </div>
    ${orderedDates.map(date => `<section class="report-date-section">
      <h2 class="report-date-heading">${escapeHtml(date)}</h2>
      ${rowsByDate[date].map(row => `<div class="report-entry">
        <div class="report-entry-customers">客户：${escapeHtml(row.customers || "-")}</div>
        <div class="report-entry-line">房间号： ${escapeHtml(row.room || "-")}</div>
        <div class="report-entry-line">场次： ${escapeHtml(row.session || "-")}</div>

      cell += '"';
      i++;

      inQuotes = !inQuotes;
    } else if (char === "," && !inQuotes) {
      row.push(cell);
      cell = "";

      if (char === "\r" && next === "\n") i++;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += char;
    }

    rows.push(row);

    if (!remaining.length) {

      if (!seen.has(key)) {

      const group = [anchor, ...extra];
      if (!validGroup(group)) return;

        button.onclick = () => {
          const [planIndexText, tableIndexText, seatIndexText, swapCustomerId] = button.dataset.swapCandidate.split(":");
          const activePlan = plans[Number(planIndexText)];
          const tableIndex = Number(tableIndexText);
          const seatIndex = Number(seatIndexText);
          const leftover = activePlan.leftovers.find(c => c.id === swapCustomerId);
          const seated = activePlan.groups[tableIndex][seatIndex];
          if (!leftover || !seated) return;
          const nextGroup = activePlan.groups[tableIndex].map((item, index) => index === seatIndex ? leftover : item).filter(Boolean);
          if (!validGroup(nextGroup)) {
            alert("替换后会违反“不能同桌”规则，不能替换。");
            return;
          }
          activePlan.groups[tableIndex][seatIndex] = leftover;
          activePlan.leftovers = activePlan.leftovers.filter(c => c.id !== leftover.id);
          if (!activePlan.leftovers.some(c => c.id === seated.id)) activePlan.leftovers.push(seated);
          selectedEmptySlot = null;
          syncPlanChange(activePlan);
          dialog.close();
          redraw();
        };
      });
    }
    dialog.showModal();
  };

  output.querySelectorAll("[data-select-plan]").forEach(button => {
    button.onclick = () => {
      const chosenPlan = plans[Number(button.dataset.selectPlan)];
      plans.splice(0, plans.length, chosenPlan);
      selectedPlanIndex = 0;
      selectedEmptySlot = null;
      saveSelectedPlanRegistration(day, chosenPlan);
      redraw();
    };
  });

  output.querySelectorAll("[data-remove-seat]").forEach(button => {
    button.onclick = () => {
      const [planIndex, tableIndex, seatIndex] = button.dataset.removeSeat.split(":").map(Number);
      const plan = plans[planIndex];
      const customer = plan.groups[tableIndex][seatIndex];
      if (!customer) return;
      plan.groups[tableIndex][seatIndex] = null;
      if (!plan.leftovers.some(c => c.id === customer.id)) plan.leftovers.push(customer);
      selectedEmptySlot = { planIndex, tableIndex, seatIndex };
      syncPlanChange(plan);
      redraw();
    };
  });

  output.querySelectorAll("[data-empty-seat]").forEach(button => {
    button.onclick = () => {
      const [planIndex, tableIndex, seatIndex] = button.dataset.emptySeat.split(":").map(Number);
      selectedEmptySlot = { planIndex, tableIndex, seatIndex };
      redraw();
    };
  });

  output.querySelectorAll("[data-fill-leftover]").forEach(button => {
    if (options.leftoverAction === "replace") {
      const openReplace = () => {
        const [planIndexText, customerId] = button.dataset.replaceLeftover.split(":");
        openReplacementDialog(Number(planIndexText), customerId);
      };
      button.title = "点击或双击打开替换名单";
      button.onclick = openReplace;
      button.ondblclick = openReplace;
      return;
    }
    let clickTimer = null;
    button.ondblclick = () => {
      if (clickTimer) clearTimeout(clickTimer);
      const [planIndexText, customerId] = button.dataset.replaceLeftover.split(":");
      openReplacementDialog(Number(planIndexText), customerId);
    };
    button.onclick = () => {
      if (clickTimer) clearTimeout(clickTimer);
      clickTimer = setTimeout(() => {
        const [planIndexText, customerId] = button.dataset.fillLeftover.split(":");
        const planIndex = Number(planIndexText);
        const plan = plans[planIndex];
        let target = selectedEmptySlot && selectedEmptySlot.planIndex === planIndex ? selectedEmptySlot : null;
        if (!target || plan.groups[target.tableIndex][target.seatIndex]) {
          target = null;
          plan.groups.some((group, tableIndex) => {
            const seatIndex = group.findIndex(c => !c);
            if (seatIndex >= 0) {
              target = { planIndex, tableIndex, seatIndex };
              return true;
            }
            return false;
          });
        }
        if (!target) {
          alert("这个方案里没有空位。请先点击桌上的客户移出。");
          return;
        }
        const customer = plan.leftovers.find(c => c.id === customerId);
        if (!customer) return;
        const group = plan.groups[target.tableIndex].filter(Boolean);
        if (!validGroup([...group, customer])) {
          alert("这个客户与当前桌内客户存在“不能同桌”关系，不能补到这个空位。");
          return;
        }
        plan.groups[target.tableIndex][target.seatIndex] = customer;
        plan.leftovers = plan.leftovers.filter(c => c.id !== customer.id);
        selectedEmptySlot = null;
        syncPlanChange(plan);
        redraw();
      }, 220);
    };
  });
}
function manualPlanFromSeats(people) {
  const selectedIds = new Set(manualTeamSeats.filter(Boolean));
  const group = manualTeamSeats.map(id => people.find(c => c.id === id) || null);
  const leftovers = people.filter(c => !selectedIds.has(c.id));
  return { groups: [group], leftovers };
}
function renderManualTeams() {
  const day = document.querySelector("#teamDayInput").value || today();
  document.querySelector("#dayInput").value = day;
  const map = byId();
  const people = signupIds(day).map(id => map[id]).filter(Boolean);
  const output = document.querySelector("#teamOutput");
  selectedPlanIndex = null;
  selectedEmptySlot = null;

  if (people.length < 4) {
    output.innerHTML = `<div class="team-summary">${escapeHtml(day)} 当天报名 ${people.length} 人，少于 4 人，暂时不能手动组成一桌。</div>`;
    return;
  }

  manualTeamSeats = manualTeamSeats.map(id => people.some(c => c.id === id) ? id : null);
  const selectedIds = new Set(manualTeamSeats.filter(Boolean));
  const plan = manualPlanFromSeats(people);
  const ready = plan.groups[0].filter(Boolean).length === 4;
  const hasConflictInManual = ready && !validGroup(plan.groups[0]);
  const message = hasConflictInManual ? "当前四人里存在“不能同桌”关系，请调整后再选择方案。" : "点击左侧人名填入右侧四个空格；选满后，左侧未选人员或下方轮空名单都可点击替换。";

  output.innerHTML = `
    <div class="team-summary">${escapeHtml(day)} 当天报名 ${people.length} 人。${message}</div>
    <div class="manual-team-board">
      <div>
        <div class="table-title">今日报名人员</div>
        <div class="manual-player-list">
          ${people.map(c => `<button class="manual-player${selectedIds.has(c.id) ? " chosen" : ""}" data-manual-player="${c.id}" title="${selectedIds.has(c.id) ? "双击取消选择" : (ready ? "双击打开替换名单" : "点击填入空位")}">${escapeHtml(c.name)}</button>`).join("")}
        </div>
      </div>
      <div>
        <div class="table-title">手动四人组队</div>
        <div class="manual-seat-grid">
          ${manualTeamSeats.map((id, index) => {
            const customer = people.find(c => c.id === id);
            return `<button class="manual-seat${customer ? " filled" : ""}" data-manual-seat="${index}" title="${customer ? "双击取消选择" : "等待选择客户"}">${customer ? escapeHtml(customer.name) : `空位 ${index + 1}`}</button>`;
          }).join("")}
        </div>
        <div class="toolbar" style="margin:12px 0 0">
          <button class="primary" id="selectManualPlan" ${ready && !hasConflictInManual ? "" : "disabled"}>选择此方案</button>
          <button id="clearManualPlan">清空手动选择</button>
        </div>
      </div>
    </div>
    ${ready ? `<div style="margin-top:12px">${renderPlan(plan, 0, { showSelect: false })}</div>` : ""}
  `;

  const openManualReplacementDialog = customer => {
    const dialog = document.querySelector("#replaceDialog");
    const body = document.querySelector("#replaceBody");
    if (dialog.open) return;
    document.querySelector("#replaceTitle").textContent = `选择要与“${customer.name}”替换的人`;
    const candidates = manualTeamSeats
      .map((id, seatIndex) => ({ seated: people.find(c => c.id === id), seatIndex }))
      .filter(item => {
        if (!item.seated) return false;
        const nextGroup = manualTeamSeats.map((id, index) => index === item.seatIndex ? customer : people.find(c => c.id === id)).filter(Boolean);
        return validGroup(nextGroup);
      });

    if (!candidates.length) {
      body.innerHTML = `<div class="empty">没有符合“不能同桌”规则的可替换人员。</div>`;
    } else {
      body.innerHTML = `<div class="replace-list">${candidates.map(item => `<button class="replace-option" data-manual-swap="${item.seatIndex}:${customer.id}">
        <strong>${escapeHtml(item.seated.name)}</strong>
        <small>第 ${item.seatIndex + 1} 位</small>
      </button>`).join("")}</div>`;
      body.querySelectorAll("[data-manual-swap]").forEach(button => {
        button.onclick = () => {
          const [seatIndexText, customerId] = button.dataset.manualSwap.split(":");
          const nextCustomer = people.find(c => c.id === customerId);
          const seatIndex = Number(seatIndexText);
          if (!nextCustomer) return;
          const nextGroup = manualTeamSeats.map((id, index) => index === seatIndex ? nextCustomer : people.find(c => c.id === id)).filter(Boolean);
          if (!validGroup(nextGroup)) {
            alert("替换后会违反“不能同桌”规则，不能替换。");
            return;
          }
          manualTeamSeats[seatIndex] = nextCustomer.id;
          dialog.close();
          renderManualTeams();
        };
      });
    }
    dialog.showModal();
  };

  output.querySelectorAll("[data-manual-player]").forEach(button => {
    button.ondblclick = () => {
      const id = button.dataset.manualPlayer;
      const index = manualTeamSeats.findIndex(item => item === id);
      if (index >= 0) {
        manualTeamSeats[index] = null;
        renderManualTeams();
        return;
      }
      const customer = people.find(c => c.id === id);
      if (customer && ready) openManualReplacementDialog(customer);
    };
    button.onclick = () => {
      const id = button.dataset.manualPlayer;
      if (manualTeamSeats.includes(id)) return;
      const emptyIndex = manualTeamSeats.findIndex(item => !item);
      const customer = people.find(c => c.id === id);
      if (emptyIndex < 0) {
        if (customer && ready) openManualReplacementDialog(customer);
        return;
      }
      const nextGroup = manualTeamSeats.map(seatId => people.find(c => c.id === seatId)).filter(Boolean);
      if (customer && !validGroup([...nextGroup, customer])) {
        alert("这个客户与已选客户存在“不能同桌”关系，不能放入同一桌。");
        return;
      }
      manualTeamSeats[emptyIndex] = id;
      renderManualTeams();
    };
  });

  output.querySelectorAll("[data-replace-leftover], [data-fill-leftover]").forEach(button => {
    const openPreviewReplacement = event => {
      event.preventDefault();
      event.stopPropagation();
      const value = button.dataset.replaceLeftover || button.dataset.fillLeftover || "";
      const customerId = value.split(":")[1];
      const customer = people.find(c => c.id === customerId);
      if (customer && ready) openManualReplacementDialog(customer);
    };
    button.title = "点击或双击打开替换名单";
    button.onclick = openPreviewReplacement;
    button.ondblclick = openPreviewReplacement;
  });

  output.querySelectorAll("[data-manual-seat]").forEach(button => {
    button.ondblclick = () => {
      manualTeamSeats[Number(button.dataset.manualSeat)] = null;
      renderManualTeams();
    };
  });

  const selectButton = output.querySelector("#selectManualPlan");
  if (selectButton) {
    selectButton.onclick = () => {
      const chosenPlan = manualPlanFromSeats(people);
      if (chosenPlan.groups[0].filter(Boolean).length !== 4) {
        alert("请先选择满 4 位客户。");
        return;
      }
      if (!validGroup(chosenPlan.groups[0])) {
        alert("当前四人里存在“不能同桌”关系，不能选择这个方案。");
        return;
      }
      selectedPlanIndex = 0;
      selectedEmptySlot = null;
      const registrationId = saveSelectedPlanRegistration(day, chosenPlan);
      output.innerHTML = `<div class="team-summary">已选择手动组队方案，并同步到每日客户登记。</div>${renderPlan(chosenPlan, 0, { showSelect: false })}`;
      bindPlanButtons(output, day, people, [chosenPlan], 1, Math.max(0, people.length - 4), {
        renderPlanOptions: { showSelect: false },
        selectedMessage: "已选择手动组队方案，并同步到每日客户登记。",
        leftoverAction: "replace",
        onPlanChange: plan => updateRegistrationFromPlan(registrationId, plan)
      });
    };
  }

  const clearButton = output.querySelector("#clearManualPlan");
  if (clearButton) {
    clearButton.onclick = () => {
      manualTeamSeats = [null, null, null, null];
      renderManualTeams();
    };
  }
}
function makeTeams() {
  const day = document.querySelector("#teamDayInput").value || today();
  document.querySelector("#dayInput").value = day;
  const map = byId();
  const people = signupIds(day).map(id => map[id]).filter(Boolean);
  const output = document.querySelector("#teamOutput");
  selectedPlanIndex = null;
  selectedEmptySlot = null;
  manualTeamSeats = [null, null, null, null];
  if (people.length < 4) {
    output.innerHTML = `<div class="team-summary">${escapeHtml(day)} 当天报名 ${people.length} 人，少于 4 人，暂时不能组成一桌。</div>`;
  } else {
    const { plans, tableCount, leftoverCount, capped } = buildFullPlans(people);
    plans.capped = capped;
    if (!plans.length) {
      output.innerHTML = `<div class="team-summary">${escapeHtml(day)} 当天报名 ${people.length} 人，但没有找到符合“不能同桌”规则的完整组队方案。</div>`;
    } else {
      output.innerHTML = `<div class="team-summary">${planSummary(day, people, tableCount, leftoverCount, plans, "请选择其中一个方案使用。")}</div>${plans.map(renderPlan).join("")}`;
      bindPlanButtons(output, day, people, plans, tableCount, leftoverCount);
    }
  }
  render();
}
function clearTeams() {
  selectedPlanIndex = null;
  selectedEmptySlot = null;
  manualTeamSeats = [null, null, null, null];
  document.querySelector("#teamOutput").innerHTML = "请选择日期并点击“自动四人组队”或“手动四人组队”。";
}
function clearRegistrations() {
  data.registrations = [];
  localStorage.setItem(KEY, JSON.stringify(data));
  renderRegistrations();
}

document.querySelectorAll("nav button").forEach(b => b.onclick = () => setView(b.dataset.view));
document.querySelector("#search").oninput = renderCustomers;
document.querySelector("#signupSearch").oninput = event => {
  signupSearchText = event.target.value;
  renderSignup();
};
document.querySelector("#addCustomer").onclick = () => openCustomer();
document.querySelector("#editCustomer").onclick = editCustomer;
document.querySelector("#deleteCustomer").onclick = deleteCustomer;
document.querySelector("#fieldsBtn").onclick = openFields;
document.querySelector("#saveCustomer").onclick = saveCustomer;
document.querySelector("#deleteCustomerInDialog").onclick = deleteCustomerInDialog;
document.querySelector("#closeCustomer").onclick = document.querySelector("#cancelCustomer").onclick = () => {
  editingId = null;
  document.querySelector("#customerDialog").close();
};
document.querySelector("#saveFields").onclick = saveFields;
document.querySelector("#closeFields").onclick = document.querySelector("#cancelFields").onclick = () => document.querySelector("#fieldDialog").close();
document.querySelector("#closeReplace").onclick = document.querySelector("#cancelReplace").onclick = () => document.querySelector("#replaceDialog").close();
document.querySelector("#closeTableExpense").onclick = document.querySelector("#cancelTableExpense").onclick = () => document.querySelector("#tableExpenseDialog").close();
document.querySelector("#closeDailyReport").onclick = document.querySelector("#cancelDailyReport").onclick = () => document.querySelector("#dailyReportDialog").close();
document.querySelector("#openDailyReport").onclick = openDailyReport;
document.querySelector("#generateDailyReport").onclick = generateDailyReport;
document.querySelector("#exportReportPdf").onclick = exportReportPdf;
document.querySelector("#exportReportPng").onclick = exportReportPng;
document.querySelector("#dayInput").value = today();
document.querySelector("#teamDayInput").value = today();
document.querySelector("#dayInput").onchange = () => { selectedAvailable.clear(); selectedSignup.clear(); render(); };
document.querySelector("#teamDayInput").onchange = e => { document.querySelector("#dayInput").value = e.target.value; render(); };
document.querySelector("#addSignup").onclick = addSignup;
document.querySelector("#removeSignup").onclick = removeSignup;
document.querySelector("#clearSignup").onclick = clearSignup;
document.querySelector("#makeTeams").onclick = makeTeams;
document.querySelector("#manualTeams").onclick = renderManualTeams;
document.querySelector("#clearTeams").onclick = clearTeams;
document.querySelector("#clearRegistrations").onclick = clearRegistrations;
document.querySelector("#exportAllData").onclick = exportAllData;
document.querySelector("#importAllDataBtn").onclick = () => openImport("all");
document.querySelector("#importFileInput").onchange = event => handleImportFile(event.target.files?.[0]);
document.querySelector("#lightModeBtn").onclick = () => applyTheme("light");
document.querySelector("#darkModeBtn").onclick = () => applyTheme("dark");
loadTheme();
render();
</script>
