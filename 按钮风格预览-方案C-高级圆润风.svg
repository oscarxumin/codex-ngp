  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="44" y="36" width="1192" height="150" rx="24" fill="#ffffff" stroke="#e4eaf0" filter="url(#subtleShadow)"/>
  <rect x="76" y="63" width="96" height="96" rx="20" fill="#f7fbfe" stroke="#d7e8f2"/>
  <text x="95" y="120" font-size="34" font-family="Arial" font-weight="800" fill="#168fc9">牌</text>
  <text x="194" y="92" font-size="30" font-family="Microsoft YaHei, PingFang SC, Arial" font-weight="800" fill="#168fc9">新天地棋牌会所</text>
